# Copy to config.toml and edit.

# Workspace domain (informational; OAuth is per-user).
domain = "example.com"

# Account to authenticate as (or to impersonate if using domain-wide delegation).
user = "alice@example.com"

# Auth mode: "oauth" (per-user consent) or "service_account" (domain-wide delegation).
auth_mode = "oauth"

# --- oauth mode ---
# OAuth client secret JSON from Google Cloud Console (OAuth 2.0 client, Desktop type).
client_secret_file = "client_secret.json"
# Refresh token cache (created on first login).
token_file = "token.json"

# --- service_account mode (only used when auth_mode = "service_account") ---
# Service account JSON key. The service account must have domain-wide delegation
# enabled and be authorized in the Workspace admin console for the scopes below.
service_account_file = "service_account.json"

# How often to poll for new mail, in seconds (only used by --poll watcher).
poll_interval = 15

# Domains registered within this many days trigger the young-domain warning.
young_domain_days = 365

## When each check fires, what does it do to URLs in the displayed body?
##   "no"   — disable the check entirely
##   "yes"  — defang just the URL that tripped the check
##   "all"  — defang every URL in the body (escalate to message-level)
## "Sender" checks have no per-URL meaning; "yes" there behaves like "all".
defang_on_smtp_fail           = "all"
defang_on_password_form       = "all"
defang_on_sender_lookalike    = "all"
defang_on_sender_young_domain = "all"
defang_on_young_domain        = "yes"
defang_on_link_lookalike      = "all"
defang_on_anchor_deception    = "yes"
defang_on_macro               = "all"
# external_warning has no specific URL — "yes" behaves like "all" (whole body
# defanged when the external_warning stage fires). Default "no" keeps the
# yellow banner cosmetic; flip to "all" to also neuter every link in mail
# from outside the org.
defang_on_external            = "no"

# Max Damerau-Levenshtein edits between sender label and user label (after
# Unicode homoglyph normalization) that still counts as a lookalike.
sender_lookalike_max_distance = 2

# SMTP sender verification: probe the sender's MX (port 587 then 25), say HELO,
# MAIL FROM (our address) + RCPT TO (the sender), then RSET and QUIT. We never
# send DATA, so no mail is generated. Set to false to skip the network probe.
# Some MX operators consider this abusive — use with judgement.
smtp_verify = true

# Reject sender domains younger than this many days (or with unknown age — an
# unresolvable registration date is treated as "too young" for this check).
sender_min_domain_age_days = 365

# Sender hosts matching any of these regexes (re.fullmatch) skip the
# sender-side checks (sender_domain_age, sender_lookalike, smtp_verify).
# Match is against the full host of the From: address (lowercased), e.g.
# "tenant.atlassian.net". Atlassian cloud is the canonical example: each
# tenant gets its own young subdomain that trips every sender heuristic
# without being malicious.
sender_whitelist = ['.*\.atlassian\.net']

# Ordered phases of checks. All checks in a phase run; if ANY check in a phase
# is suspicious, every later phase is skipped — its checks are not run and
# its network actions are not taken. The default cascade is:
#   phase 0 — informational only, never gates:
#             external_warning        (yellow banner if sender outside org)
#   phase 1 — cheap data-only checks on the sender:
#             sender_domain_age, sender_lookalike
#   phase 2 — probe the sender's MX over SMTP (touches their server):
#             smtp_verify
#   phase 3 — data-only checks on each link's registrable domain:
#             check_link_domain_age   (RDAP at rdap.org)
#             check_link_lookalike    (vs recipient domain, no network)
#   phase 4 — fetch every URL in the body to look for password forms and
#             resolve redirectors (exposes your IP to the destination):
#             check_password_form
# Each stage may appear in at most one phase. Unknown stages are rejected.
check_phases = [
    ["external_warning"],
    ["sender_domain_age", "sender_lookalike"],
    ["smtp_verify"],
    ["check_link_domain_age", "check_link_lookalike"],
    ["check_password_form"],
]

# Phases used when the sender's domain is one of ours (workspace-owned).
# Internal mail skips domain-age, SMTP probe, and lookalike checks by default
# (they're noise for known senders). The `external_warning` stage is a no-op
# here — by definition the sender is internal.
check_phases_internal = [
    ["check_password_form"],
]

# Yellow banner text rendered when the `external_warning` stage fires (sender
# external + stage listed in check_phases above). Purely informational — it
# never gates other phases. Remove `external_warning` from check_phases to
# suppress the banner entirely.
external_warning_text = "Sender is external to the organization, beware."
# HTML version, used when the body is text/html. Rendered verbatim — you own
# the markup and styling. Default is a yellow boxed banner.
external_warning_html = '''<div style="border:2px solid #b58900; background:#fffbe6; padding:12px; margin:0 0 16px 0; font-family:Roboto,Arial,Helvetica,sans-serif; font-size:14px; color:#5a4a00;"><div style="font-weight:bold;">Sender is external to the organization, beware.</div></div>'''

# Required when rewrite_only_from is non-empty. Used as the HMAC key that
# stamps every inserted copy with an X-Checked-Mac header, so the watcher
# recognizes our own rewrites and doesn't loop. A header-only marker would be
# trivially forged by any sender — keep this secret. Generate one with either:
#   openssl rand -base64 32
#   python -c "import secrets; print(secrets.token_urlsafe(32))"
loop_guard_secret = ""

# Rewrite gate: each entry is a regex matched (re.fullmatch) against the bare,
# lowercased From: address. A matching address whose mail is suspicious gets
# its original deleted and a rewritten copy inserted.
#   []          → rewriting disabled (no sender matches; default)
#   [".*"]      → every sender (DESTRUCTIVE; only after you trust the round-trip)
#   ['alice@example\.com', '.*@yourcompany\.tld']
#               → exact address, then everyone on a domain
# Once non-empty, loop_guard_secret above must be set.
rewrite_only_from = []

# --- domain-wide (DWD) settings — only used by `python -m tfatp.cli.watch_domain` ---

# Workspace super-admin to impersonate for the Admin SDK Directory API call that
# lists users in the domain. Leave empty to skip user enumeration.
admin_user = ""

# Cloud Pub/Sub config for push-based new-mail notifications.
# If any of these is empty, watch_domain falls back to the polling loop.
pubsub_project_id = ""
pubsub_topic = ""
pubsub_subscription = ""

# IMAP server used by the IDLE watcher. Defaults to Gmail's (imap.gmail.com:993).
# Override only for non-Gmail setups or test servers.
imap_host = "imap.gmail.com"
imap_port = 993
